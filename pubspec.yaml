name: entre_tempos
description: "Escreva hoje. Leia amanhã."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.10.1
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  image_picker: ^1.2.1
  video_player: ^2.11.1
  file_picker: ^8.1.2
  audioplayers: ^5.2.1
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/montserrat/Montserrat-ThinItalic.ttf
          style: italic
          weight: 100
        - asset: assets/montserrat/Montserrat-ExtraLightItalic.ttf
          style: italic
          weight: 200
        - asset: assets/montserrat/Montserrat-LightItalic.ttf
          style: italic
          weight: 300
        - asset: assets/montserrat/Montserrat-Italic.ttf
          style: italic
          weight: 400
        - asset: assets/montserrat/Montserrat-MediumItalic.ttf
          style: italic
          weight: 500
        - asset: assets/montserrat/Montserrat-SemiBoldItalic.ttf
          style: italic
          weight: 600
        - asset: assets/montserrat/Montserrat-BoldItalic.ttf
          style: italic
          weight: 700
        - asset: assets/montserrat/Montserrat-ExtraBoldItalic.ttf
          style: italic
          weight: 800
        - asset: assets/montserrat/Montserrat-BlackItalic.ttf
          style: italic
          weight: 900
        - asset: assets/montserrat/Montserrat-Thin.ttf
          weight: 100
        - asset: assets/montserrat/Montserrat-ExtraLight.ttf
          weight: 200
        - asset: assets/montserrat/Montserrat-Light.ttf
          weight: 300
        - asset: assets/montserrat/Montserrat-Regular.ttf
          weight: 400
        - asset: assets/montserrat/Montserrat-Medium.ttf
          weight: 500
        - asset: assets/montserrat/Montserrat-SemiBold.ttf
          weight: 600
        - asset: assets/montserrat/Montserrat-Bold.ttf
          weight: 700
        - asset: assets/montserrat/Montserrat-ExtraBold.ttf
          weight: 800
        - asset: assets/montserrat/Montserrat-Black.ttf
          weight: 900
